name: Build And Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            artifact_name: gtasks-mcp-linux-amd64
          - goarch: arm64
            artifact_name: gtasks-mcp-linux-arm64

    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Set Up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.artifact_name }}" ./cmd/server

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  docker:
    name: Build And Publish Docker Image
    runs-on: ubuntu-latest
    needs:
      - build-binaries
    permissions:
      contents: read

    steps:
      - name: Check Out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download Binary Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: gtasks-mcp-linux-*
          merge-multiple: true

      - name: Compute Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.event_name == 'pull_request' && 'gtasks-mcp' || format('{0}/gtasks-mcp', secrets.DOCKERHUB_USERNAME) }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log In To Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build And Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
